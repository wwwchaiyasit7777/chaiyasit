<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Electric Pro Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Chart.js Plugin for Labels -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-slate-800">รายงาน Maintenance Electric</h1>
            <p class="text-slate-500">ติดตามและวิเคราะห์สถานะงานไฟฟ้าประจำวัน</p>
        </header>

        <!-- Filters Section -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-4 mb-8 glass-card p-6 rounded-3xl shadow-lg">
            <div class="flex flex-col"><label class="text-xs font-semibold text-slate-400 mb-1">เริ่ม</label><input type="date" id="dateStart" class="bg-slate-100 rounded-xl p-2 focus:ring-2 focus:ring-indigo-400"></div>
            <div class="flex flex-col"><label class="text-xs font-semibold text-slate-400 mb-1">สิ้นสุด</label><input type="date" id="dateEnd" class="bg-slate-100 rounded-xl p-2 focus:ring-2 focus:ring-indigo-400"></div>
            <div class="flex flex-col"><label class="text-xs font-semibold text-slate-400 mb-1">ประเภทงาน (I)</label><select id="filterType" class="bg-slate-100 rounded-xl p-2"><option value="">ทั้งหมด</option></select></div>
            <div class="flex flex-col"><label class="text-xs font-semibold text-slate-400 mb-1">ผู้รับผิดชอบ (E)</label><select id="filterPic" class="bg-slate-100 rounded-xl p-2"><option value="">ทั้งหมด</option></select></div>
            <div class="flex flex-col"><label class="text-xs font-semibold text-slate-400 mb-1">เครื่องจักร (F)</label><select id="filterMachine" class="bg-slate-100 rounded-xl p-2"><option value="">ทั้งหมด</option></select></div>
            <div class="flex flex-col"><label class="text-xs font-semibold text-slate-400 mb-1">สถานะ (K)</label><select id="filterStatus" class="bg-slate-100 rounded-xl p-2"><option value="">ทั้งหมด</option></select></div>
        </div>

        <!-- KPI Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card p-6 rounded-3xl shadow-md border-l-8 border-indigo-500"><h3 class="text-slate-500">งานทั้งหมด</h3><p id="totalJobs" class="text-4xl font-bold text-slate-800">0</p></div>
            <div class="glass-card p-6 rounded-3xl shadow-md border-l-8 border-green-500"><h3 class="text-slate-500">งานที่เสร็จ</h3><p id="finishedJobs" class="text-4xl font-bold text-green-600">0</p><p id="finishedPct" class="text-sm text-green-400">0%</p></div>
            <div class="glass-card p-6 rounded-3xl shadow-md border-l-8 border-amber-500"><h3 class="text-slate-500">งานค้าง</h3><p id="pendingJobs" class="text-4xl font-bold text-amber-600">0</p><p id="pendingPct" class="text-sm text-amber-400">0%</p></div>
        </div>

        <!-- Charts Section -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <div class="glass-card p-6 rounded-3xl shadow-lg"><canvas id="statusChart" class="max-h-80"></canvas></div>
            <div class="glass-card p-6 rounded-3xl shadow-lg"><canvas id="picChart" class="max-h-80"></canvas></div>
        </div>

        <!-- Data Table -->
        <div class="glass-card rounded-3xl shadow-lg overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-200 text-slate-700 uppercase text-xs" id="tableHeader"></thead>
                    <tbody class="divide-y divide-slate-100" id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ... existing code ...
        // (Note: The initialization, filtering, and table logic remains unchanged as requested)
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQJTzys96pLM72Ip3Pj5iqCLzRX54FB1wjuwDbZmB7o6uDgXtTFX251GprI7BX4WN_Iy13F-Uopi5sq/pub?gid=1734643829&single=true&output=csv';
        let rawData = [];
        let statusChart, picChart;
        const IDX_DATE = 0; const IDX_PIC = 4; const IDX_MACHINE = 5; const IDX_TYPE = 8; const IDX_STATUS = 10;

        window.onload = () => {
            fetch(CSV_URL).then(r => r.text()).then(text => {
                Papa.parse(text, { header: true, complete: res => { rawData = res.data; initFilters(); applyFilters(); } });
            });
        };

        function initFilters() {
            const cols = Object.keys(rawData[0] || {});
            const mapping = { 'filterType': cols[IDX_TYPE], 'filterPic': cols[IDX_PIC], 'filterMachine': cols[IDX_MACHINE], 'filterStatus': cols[IDX_STATUS] };
            for (const [id, key] of Object.entries(mapping)) {
                const el = document.getElementById(id);
                const vals = [...new Set(rawData.map(d => d[key]).filter(Boolean))];
                vals.forEach(v => el.innerHTML += `<option value="${v}">${v}</option>`);
                el.addEventListener('change', applyFilters);
            }
            ['dateStart', 'dateEnd'].forEach(id => document.getElementById(id).addEventListener('change', applyFilters));
        }

        function applyFilters() {
            const filters = {
                type: document.getElementById('filterType').value,
                pic: document.getElementById('filterPic').value,
                machine: document.getElementById('filterMachine').value,
                status: document.getElementById('filterStatus').value,
                start: document.getElementById('dateStart').value,
                end: document.getElementById('dateEnd').value
            };
            const cols = Object.keys(rawData[0] || {});
            const filtered = rawData.filter(d => {
                const matches = [(!filters.type || d[cols[IDX_TYPE]] === filters.type), (!filters.pic || d[cols[IDX_PIC]] === filters.pic), (!filters.machine || d[cols[IDX_MACHINE]] === filters.machine), (!filters.status || d[cols[IDX_STATUS]] === filters.status)];
                if (filters.start || filters.end) {
                    const dParts = d[cols[IDX_DATE]].split('/');
                    const dDate = new Date(`${dParts[2]}-${dParts[1]}-${dParts[0]}`);
                    matches.push((!filters.start || dDate >= new Date(filters.start)) && (!filters.end || dDate <= new Date(filters.end)));
                }
                return matches.every(Boolean);
            });
            updateDashboard(filtered);
        }

        function updateDashboard(data) {
            const cols = Object.keys(rawData[0] || {});
            const statusKey = cols[IDX_STATUS];
            const picKey = cols[IDX_PIC];
            const finished = data.filter(d => d[statusKey] === 'เสร็จแล้ว').length;
            const pending = data.length - finished;
            document.getElementById('totalJobs').innerText = data.length;
            document.getElementById('finishedJobs').innerText = finished;
            document.getElementById('finishedPct').innerText = data.length ? Math.round((finished/data.length)*100) + '%' : '0%';
            document.getElementById('pendingJobs').innerText = pending;
            document.getElementById('pendingPct').innerText = data.length ? Math.round((pending/data.length)*100) + '%' : '0%';
            renderTable(data, cols);
            renderCharts(data, statusKey, picKey);
        }

        function renderTable(data, cols) {
            const tbody = document.getElementById('tableBody');
            const thead = document.getElementById('tableHeader');
            thead.innerHTML = `<tr>${cols.map(c => `<th class="p-4 whitespace-nowrap">${c}</th>`).join('')}</tr>`;
            tbody.innerHTML = data.map(row => `<tr class="hover:bg-slate-50">${cols.map(c => `<td class="p-4 whitespace-nowrap">${row[c] || '-'}</td>`).join('')}</tr>`).join('');
        }

        // --- FIXED renderCharts ---
        function renderCharts(data, sKey, pKey) {
            if (statusChart) statusChart.destroy();
            if (picChart) picChart.destroy();
            const sCounts = data.reduce((acc, d) => { acc[d[sKey]] = (acc[d[sKey]] || 0) + 1; return acc; }, {});
            const pCounts = data.reduce((acc, d) => { acc[d[pKey]] = (acc[d[pKey]] || 0) + 1; return acc; }, {});
            
            Chart.register(ChartDataLabels);

            statusChart = new Chart(document.getElementById('statusChart'), {
                type: 'doughnut',
                data: { labels: Object.keys(sCounts), datasets: [{ data: Object.values(sCounts), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b'] }] },
                options: {
                    responsive: true,
                    plugins: {
                        datalabels: { formatter: (v, ctx) => { let p = Math.round(v/data.length*100); return `${v} (${p}%)`; }, color: '#fff', font: { weight: 'bold' } },
                        title: { display: true, text: 'สถานะงาน' }
                    }
                }
            });

            picChart = new Chart(document.getElementById('picChart'), {
                type: 'bar',
                data: { 
                    labels: Object.keys(pCounts), 
                    datasets: [{ label: 'จำนวนงาน', data: Object.values(pCounts), backgroundColor: ['#6366f1', '#ec4899', '#f59e0b', '#8b5cf6', '#14b8a6'] }] 
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    plugins: {
                        datalabels: { anchor: 'end', align: 'right', formatter: (v, ctx) => { let p = Math.round(v/data.length*100); return `${v} (${p}%)`; } },
                        title: { display: true, text: 'งานแยกตามผู้รับผิดชอบ' }
                    }
                }
            });
        }
    </script>
</body>
</html>
